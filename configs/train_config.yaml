# BehR-WM Training Configuration Template
# =========================================
# Reference values that reproduce the BehR-WM results reported in the paper.
# See docs/TRAINING.md for the full verl invocation.

# Model Configuration
model:
  # Base world models available on HuggingFace (see docs/TRAINING.md):
  #   X1AOX1A/WorldModel-Webshop-Qwen2.5-7B
  #   X1AOX1A/WorldModel-Webshop-Llama3.1-8B
  #   X1AOX1A/WorldModel-Textworld-Qwen2.5-7B
  #   X1AOX1A/WorldModel-Textworld-Llama3.1-8B
  world_model: "X1AOX1A/WorldModel-Webshop-Llama3.1-8B"
  reference_agent_model: "Qwen/Qwen3-8B"

# Data Configuration
data:
  # Training datasets will be published under Ricardo-H/behr-wm-data (v0.4).
  train_file: "data/train/train.parquet"
  test_file:  "data/test/test.parquet"
  max_prompt_length: 14336
  max_response_length: 1024
  train_batch_size: 32           # 4-GPU; use 128 on 8-GPU.

# GRPO Training Configuration (verl-compatible)
training:
  learning_rate: 5e-6
  num_epochs: 5
  save_freq: 20
  kl_loss_coef: 0.001
  entropy_coeff: 0.0
  use_kl_in_reward: false
  ppo_mini_batch_size: 32
  ppo_micro_batch_size_per_gpu: 1

# Rollout Configuration (vLLM)
rollout:
  tensor_model_parallel_size: 2  # 4-GPU: TP=2; 8-GPU: TP=2 as well
  gpu_memory_utilization: 0.5
  max_model_len: 16384
  temperature: 1.3
  top_p: 1.0
  n: 5                           # group size; use 8 on 8-GPU

# Reward Configuration (BehR)
reward:
  # Mode:
  #   - cauchy (recommended):  R = 1 / (1 + alpha*|Delta|)
  #   - exponential:           R = exp(-alpha*|Delta|)
  reward_mode: "cauchy"
  behavior_scale_coef: 1.0       # alpha
  behavior_weight: 0.8           # set to 1.0 for BehR-only
  facts_weight: 0.2              # set to 0.0 for BehR-only
  format_penalty: -2.0

# Server Configuration
servers:
  reference_agent_port: 8000
  wm_port: 8001
  env_port_range: [30000, 99999]

# Output Configuration
output:
  output_dir: "outputs/checkpoints"
  save_steps: 20
  logging_steps: 10
